<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        #reader { width: 320px; margin: auto; border-radius: 10px; border: 5px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #status { margin-top: 20px; font-weight: bold; color: #1a73e8; font-size: 1.2em; }
    </style>
</head>
<body>
    <h2>Scan Student QR</h2>
    <div id="reader"></div>
    <div id="status">Ready to scan...</div>

    <script>
        // PASTE YOUR GOOGLE WEB APP URL HERE
        const scriptURL = 'YOUR_WEB_APP_URL_HERE'; 

        function onScanSuccess(decodedText) {
            html5QrcodeScanner.clear();
            document.getElementById('status').innerText = "Logging: " + decodedText;

            // Send data to Google Sheets
            fetch(`${scriptURL}?id=${encodeURIComponent(decodedText)}`)
                .then(() => {
                    document.getElementById('status').style.color = "green";
                    document.getElementById('status').innerText = "✅ Saved: " + decodedText;
                    setTimeout(startScanner, 3000);
                })
                .catch(() => {
                    document.getElementById('status').style.color = "red";
                    document.getElementById('status').innerText = "❌ Connection Error!";
                    setTimeout(startScanner, 3000);
                });
        }

        function startScanner() {
            document.getElementById('status').style.color = "#1a73e8";
            document.getElementById('status').innerText = "Scanning...";
            html5QrcodeScanner.render(onScanSuccess);
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        startScanner();
    </script>
</body>
</html>
