<!DOCTYPE html>
<html>
<head>
    <title>Attendance Scanner</title>
    <script src="https://script.google.com/u/0/home/projects/1bVbvOjyBSdUp6CtQp0Hqrodlqn2LPfRe1b05El3mhH8yALD1WuDKFZTM/"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f0f2f5; padding: 20px; }
        #reader { width: 320px; margin: auto; border-radius: 10px; border: 5px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #status { margin-top: 20px; font-weight: bold; color: #1a73e8; font-size: 1.2em; }
    </style>
</head>
<body>
    <h2>Scan Student QR</h2>
    <div id="reader"></div>
    <div id="status">Scanning...</div>

    <script>
        const scriptURL = 'YOUR_API_URL'; // PASTE YOUR URL HERE

        function onScanSuccess(decodedText) {
            html5QrcodeScanner.clear();
            document.getElementById('status').innerText = "Logging: " + decodedText;

            fetch(`${scriptURL}?id=${encodeURIComponent(decodedText)}`)
                .then(() => {
                    document.getElementById('status').innerText = "✅ Saved: " + decodedText;
                    setTimeout(startScanner, 2500);
                })
                .catch(() => {
                    alert("Connection Error!");
                    startScanner();
                });
        }

        function startScanner() {
            html5QrcodeScanner.render(onScanSuccess);
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        startScanner();
    </script>
</body>
</html>
