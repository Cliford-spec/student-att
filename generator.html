<!DOCTYPE html>
<html>
<head>
    <title>Student QR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 40px; background: #f4f7f6; }
        .card { background: white; padding: 20px; display: inline-block; border-radius: 10px; shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input { padding: 10px; margin: 5px; width: 200px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #qrcode { margin-top: 20px; display: flex; justify-content: center; }
        h3 { margin-top: 10px; color: #333; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Create Student QR</h2>
        <input type="text" id="idInput" placeholder="Student ID (e.g. 2026-01)"> <br>
        <input type="text" id="nameInput" placeholder="Full Name (e.g. Juan Dela Cruz)"> <br>
        <button onclick="makeQR()">Generate QR Code</button>

        <div id="qrcode"></div>
        <h3 id="displayName"></h3>
        <p id="hint" style="display:none; font-size: 12px; color: gray;">Right-click the QR to save/print</p>
    </div>

    <script>
        var qrcode = new QRCode(document.getElementById("qrcode"), { width: 180, height: 180 });

        function makeQR() {
            var id = document.getElementById("idInput").value;
            var name = document.getElementById("nameInput").value;

            if (id === "" || name === "") {
                alert("Please fill in both ID and Name");
                return;
            }

            // Combine both into one string
            var combinedData = id + " - " + name;
            
            qrcode.makeCode(combinedData);
            document.getElementById("displayName").innerText = name;
            document.getElementById("hint").style.display = "block";
        }
