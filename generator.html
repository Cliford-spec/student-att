<!DOCTYPE html>
<html>
<head>
    <title>Bulk QR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; }
        .qr-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .qr-item { border: 1px solid #ddd; padding: 10px; border-radius: 5px; background: #fff; }
        .qr-label { margin-top: 5px; font-weight: bold; font-size: 14px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div class="no-print">
        <h2>Bulk QR Generator (1-50)</h2>
        <button onclick="generateAll()" style="padding: 10px 20px; cursor:pointer;">Generate 1 to 50</button>
        <button onclick="window.print()" style="padding: 10px 20px; cursor:pointer;">Print Page</button>
    </div>

    <div class="qr-grid" id="grid"></div>

    <script>
        function generateAll() {
            const grid = document.getElementById('grid');
            grid.innerHTML = ""; // Clear existing

            for (let i = 1; i <= 50; i++) {
                let container = document.createElement('div');
                container.className = 'qr-item';
                
                let qrDiv = document.createElement('div');
                container.appendChild(qrDiv);
                
                let label = document.createElement('div');
                label.className = 'qr-label';
                label.innerText = "Student #" + i;
                container.appendChild(label);
                
                grid.appendChild(container);

                new QRCode(qrDiv, {
                    text: i.toString(),
                    width: 120,
                    height: 120
                });
            }
        }
    </script>
</body>
</html>
